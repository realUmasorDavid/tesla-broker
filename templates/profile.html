{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - Tesla Capital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">

    <!-- Sidebar -->
    {% include 'partials/sidebar.html' %}

    <!-- Main Content -->
    <div class="lg:ml-56 flex-1 flex flex-col min-h-screen">

        <!-- Top Header -->
        <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-20">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="lg:hidden text-gray-600 hover:text-black">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <h1 class="text-lg font-semibold text-gray-900">Account Profile</h1>
            </div>
        </header>

        <main class="flex-1 px-3 py-6 lg:p-8">
            <div class="max-w-3xl mx-auto">
                <div class="bg-white rounded-2xl border border-gray-200 p-8 lg:p-10">
                    <h2 class="text-3xl font-semibold mb-8">Personal Information</h2>

                    <!-- Inside the form -->
                    <form method="POST" class="space-y-8">
                        {% csrf_token %}
                    
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {% for field in form %}
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">
                                    {{ field.label }}
                                    {% if field.field.required %}<span class="text-red-500">*</span>{% endif %}
                                </label>
                                {{ field }}
                                {% if field.help_text %}
                                <p class="text-xs text-gray-500 mt-1">{{ field.help_text }}</p>
                                {% endif %}
                            </div>
                            {% endfor %}
                        </div>
                    
                        <button type="submit"
                            class="mt-6 w-full md:w-auto bg-black text-white px-10 py-4 rounded-3xl font-semibold hover:bg-zinc-800 transition">
                            Save Changes
                        </button>
                    </form>

                    <!-- Referral -->
                    <div class="mt-12 pt-8 border-t border-gray-200">
                        <h3 class="font-semibold mb-3">Your Referral Code</h3>
                        <div
                            class="bg-zinc-100 border border-gray-200 rounded-2xl p-6 font-mono text-2xl tracking-widest text-center">
                            {{ profile.referral_code }}
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }

        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', function (e) {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth < 1024 && !sidebar.contains(e.target) && !e.target.closest('button')) {
                sidebar.classList.add('-translate-x-full');
            }
        });
    </script>
</body>

</html>
