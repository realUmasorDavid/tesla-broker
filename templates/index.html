{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        surface: '#1a1a1a',
                        card: '#242424',
                        border: '#2e2e2e',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="min-h-screen bg-black text-white font-sans antialiased">
    <main class="relative flex min-h-screen items-center justify-center overflow-hidden px-5 py-16 md:px-10">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,_rgba(255,255,255,0.12),_transparent_35%),linear-gradient(135deg,_#050505_0%,_#111111_45%,_#000000_100%)]"></div>
        <div class="absolute inset-0 bg-gradient-to-br from-white/5 via-transparent to-white/5"></div>

        <section class="relative z-10 w-full max-w-4xl rounded-3xl border border-white/10 bg-white/5 p-8 shadow-2xl shadow-black/40 backdrop-blur-xl md:p-12">
            <div class="max-w-2xl">
                <p class="mb-4 text-sm uppercase tracking-[0.3em] text-gray-400">Welcome</p>
                <h1 class="text-4xl font-semibold leading-tight text-white sm:text-5xl">
                    Build a smarter future with thoughtful investing.
                </h1>
                <p class="mt-5 text-lg leading-8 text-gray-300">
                    Discover a calm, modern way to grow your wealth through simple plans, clear insights, and steady opportunities.
                    This is where small steps can become lasting progress.
                </p>

                <div class="mt-8">
                    <a href="{% url 'home' %}" class="inline-flex items-center justify-center rounded-full bg-white px-6 py-3 text-sm font-semibold text-black transition hover:bg-gray-200">
                        Enter the experience
                    </a>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
