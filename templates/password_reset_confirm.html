{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tesla — New Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">
    <!-- Nav -->
    <nav class="flex items-center justify-between px-10 py-5 bg-white border-b border-gray-200">
        <a href="{% url 'index' %}">
            <img src="{% static 'logo.svg' %}" class="w-24 sm:w-32" alt="">
        </a>
        <div class="flex lg:hidden items-center gap-6 text-sm text-gray-700">
            <a href="{% url 'register' %}" class="font-medium text-black">Register</a>
        </div>
        <div class="hidden lg:flex items-center gap-6 text-sm text-gray-700">
            <a href="{% url 'index' %}" class="hover:text-black transition">Home</a>
            <a href="{% url 'inventory' %}" class="hover:text-black transition">Inventory</a>
            <a href="{% url 'login' %}" class="hover:text-black transition">Sign In</a>
            <a href="{% url 'register' %}" class="font-medium text-black">Register</a>
        </div>
    </nav>

    <!-- Card -->
    <main class="flex-1 flex items-center justify-center py-16 px-4">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 w-full max-w-sm px-8 py-10">
            <!-- Heading -->
            <div class="text-center mb-7">
                <h1 class="text-xl font-semibold text-gray-900">Set New Password</h1>
                <p class="text-sm text-gray-500 mt-1">Create a strong new password</p>
            </div>

            <!-- Messages -->
            {% if messages %}
            {% for message in messages %}
            <div class="mb-4 text-sm px-3 py-2 rounded 
                    {% if message.tags == 'error' %}bg-red-50 text-red-600 border border-red-200
                    {% else %}bg-green-50 text-green-600 border border-green-200{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <!-- Form -->
            <form method="POST" class="space-y-5">
                {% csrf_token %}
                <!-- New Password -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                    <div class="relative">
                        <input id="new_password" type="password" name="new_password" required
                            class="w-full border border-gray-300 rounded px-3 py-2 text-sm text-gray-900 pr-10 focus:outline-none focus:ring-1 focus:ring-black focus:border-black transition" />
                        <button type="button" onclick="togglePassword('new_password', 'eye1')"
                            class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-gray-700">
                            <svg id="eye1" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
                    <div class="relative">
                        <input id="confirm_password" type="password" name="confirm_password" required
                            class="w-full border border-gray-300 rounded px-3 py-2 text-sm text-gray-900 pr-10 focus:outline-none focus:ring-1 focus:ring-black focus:border-black transition" />
                        <button type="button" onclick="togglePassword('confirm_password', 'eye2')"
                            class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-gray-700">
                            <svg id="eye2" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit"
                    class="w-full bg-black text-white text-sm font-semibold py-2.5 rounded hover:bg-gray-800 transition">
                    Reset Password
                </button>
            </form>
        </div>
    </main>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
            } else {
                input.type = 'password';
                icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
            }
        }
    </script>
</body>

</html>
