{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password - Tesla Capital</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

    {% include 'partials/sidebar.html' %}

    <div class="lg:ml-56 flex-1 flex flex-col min-h-screen">
        <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-20">
            <h1 class="text-lg font-semibold text-gray-900">Change Password</h1>
        </header>

        <main class="flex-1 px-6 py-8">
            <div class="max-w-md mx-auto">
                {% include 'partials/messages.html' with message_tag='change_password' wrapper_class='mb-6 rounded-2xl px-5 py-3 text-sm font-medium' %}

                <div class="bg-white rounded-3xl border border-gray-200 p-8">
                    <form method="POST" class="space-y-6">
                        {% csrf_token %}
                        <input type="hidden" name="change_password" value="1">

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Current Password</label>
                            <input type="password" name="old_password" required
                                class="w-full px-5 py-4 border border-gray-300 rounded-3xl focus:outline-none focus:border-black">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
                            <input type="password" name="new_password1" required
                                class="w-full px-5 py-4 border border-gray-300 rounded-3xl focus:outline-none focus:border-black">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Confirm New Password</label>
                            <input type="password" name="new_password2" required
                                class="w-full px-5 py-4 border border-gray-300 rounded-3xl focus:outline-none focus:border-black">
                        </div>

                        <button type="submit"
                            class="w-full bg-black text-white py-4 rounded-3xl font-semibold hover:bg-zinc-800 transition">
                            Update Password
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
