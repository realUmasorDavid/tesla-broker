<form method="POST" enctype="multipart/form-data" class="space-y-8">
    {% csrf_token %}
    <input type="hidden" name="submit_kyc" value="1">

    {{ kyc_form.media }}

    <div class="space-y-6">
        {% for field in kyc_form %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">{{ field.label }}</label>
            {{ field }}
        </div>
        {% endfor %}
    </div>

    <button type="submit"
        class="w-full bg-black text-white py-4 rounded-3xl font-semibold hover:bg-zinc-800 transition">
        Submit Documents for Review
    </button>
</form>
