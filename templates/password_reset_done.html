{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tesla — Password Reset Sent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">
    <!-- Nav -->
    <nav class="flex items-center justify-between px-10 py-5 bg-white border-b border-gray-200">
        <a href="{% url 'index' %}">
            <img src="{% static 'logo.svg' %}" class="w-24 sm:w-32" alt="">
        </a>
        <div class="flex lg:hidden items-center gap-6 text-sm text-gray-700">
            <a href="{% url 'register' %}" class="font-medium text-black">Register</a>
        </div>
        <div class="hidden lg:flex items-center gap-6 text-sm text-gray-700">
            <a href="{% url 'index' %}" class="hover:text-black transition">Home</a>
            <a href="{% url 'inventory' %}" class="hover:text-black transition">Inventory</a>
            <a href="{% url 'login' %}" class="hover:text-black transition">Sign In</a>
            <a href="{% url 'register' %}" class="font-medium text-black">Register</a>
        </div>
    </nav>

    <!-- Card -->
    <main class="flex-1 flex items-center justify-center py-16 px-4">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 w-full max-w-sm px-8 py-10 text-center">
            <div class="mb-6">
                <div class="mx-auto w-16 h-16 bg-green-100 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-green-600" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
            </div>

            <h1 class="text-xl font-semibold text-gray-900 mb-2">Check Your Email</h1>
            <p class="text-sm text-gray-500 mb-8">
                We've sent a password reset link to your email address.<br>
                Please check your inbox (and spam folder).
            </p>

            <a href="{% url 'login' %}"
                class="inline-block bg-black text-white text-sm font-semibold px-8 py-2.5 rounded hover:bg-gray-800 transition">
                Return to Sign In
            </a>
        </div>
    </main>
</body>

</html>
